version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: recommendai_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: recommendation_system
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recommendai_backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: recommendation_system
      CORS_ORIGINS: "http://localhost:3000,http://frontend:80"
      SEED_ON_STARTUP: "false"
      RETRAIN_THRESHOLD: "100"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - model_data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: http://localhost:8000
    container_name: recommendai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # Prometheus scraper (optional — comment out if not needed)
  prometheus:
    image: prom/prometheus:latest
    container_name: recommendai_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

volumes:
  mongo_data:
  model_data:
